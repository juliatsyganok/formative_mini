{% extends 'base.html' %}
{% block title %}Создать тест{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Новый тест — {{ classroom.name }}</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Название теста</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-control" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ограничение по времени (минуты, необязательно)</label>
                    <input type="number" name="time_limit" class="form-control" min="1">
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="is_published" id="published">
                    <label class="form-check-label" for="published">Опубликовать сразу</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Создать тест</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
