{% extends 'base.html' %}
{% block title %}Создать тест{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
    <div class="card p-4">
        <h4 class="fw-bold mb-4">Новый тест</h4>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Название теста</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Ограничение по времени (минуты, необязательно)</label>
                <input type="number" name="time_limit" class="form-control" min="1">
            </div>
            <button type="submit" class="btn btn-primary w-100">Создать и добавить вопросы</button>
            <a href="/tests/" class="btn btn-outline-secondary w-100 mt-2">Отмена</a>
        </form>
    </div>
</div>
</div>
{% endblock %}
